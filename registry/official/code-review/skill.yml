id: code-review
name: Code Review
summary: Review PRs, branches, commits, patches, and local changes for real bugs, regressions, and risky assumptions.
description: "Review local code changes for bugs, regressions, missing tests, and risky assumptions. Use when asked to review a diff, pull request, patch, branch, commit, or uncommitted workspace changes before merge, commit, deploy, or promotion."
version: 1.0.0
license: MIT
visibility: public
categories:
  - coding
tags:
  - code-review
  - pr-review
  - review
  - testing
  - reliability
  - git
compatible_with:
  - codex
  - claude-code
  - cursor
  - generic-agent
install_targets:
  codex: ~/.codex/skills/code-review
  claude-code: ~/.claude/skills/code-review
  cursor: ~/.cursor/skills/code-review
source_url: https://github.com/yaacovcorcos/papiskill/tree/main/registry/official/code-review
maintainers:
  - github: yaacovcorcos
