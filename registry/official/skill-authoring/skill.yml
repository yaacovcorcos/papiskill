  - authoring
  - documentation
  - agent-skills
  - validation
compatible_with:
  - codex
  - claude-code
  - cursor
  - generic-agent
install_targets:
  codex: ~/.codex/skills/skill-authoring
  claude-code: ~/.claude/skills/skill-authoring
  cursor: ~/.cursor/skills/skill-authoring
maintainers:
  - github: yaacovcorcos
