name: check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm install

      - name: Audit high severity dependencies
        run: npm audit --audit-level=high

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Validate registry
        run: npm run registry:validate

      - name: Check generated registry freshness
        run: |
          npm run registry:generate
          git diff --exit-code -- apps/web/src/lib/server/generated-registry.ts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify CLI npm package dry run
        run: npm run cli:pack
